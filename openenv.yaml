name: api-doc-env
version: "1.0.0"
description: >
  An RL environment where an AI agent reads Python code snippets
  and must write accurate, structured documentation.
  Three difficulty levels: easy (simple functions),
  medium (classes with methods), hard (async decorators).
author: Starw Hats
tasks:
  - name: document_simple_function
    level: easy
    description: Write docs for a simple two-parameter function
  - name: document_bank_account_class
    level: medium
    description: Write docs for a class with deposit/withdraw methods
  - name: document_retry_decorator
    level: hard
    description: Write docs for an async retry decorator with exponential backoff